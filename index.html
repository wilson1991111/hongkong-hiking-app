<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HikingRice 香港行山路線搜尋 - 專業安全防禦 PWA 版</title>
    <style>
        :root {
            --bg-color: #f7f9f7;
            --text-color: #333333;
            --card-bg: #ffffff;
            --card-border: #eef2ee;
            --box-shadow: rgba(0,0,0,0.05);
            --label-color: #444444;
            --secondary-text: #666666;
            --badge-bg: #f0f4f0;
            --input-bg: #fafafa;
            --input-border: #e0e0e0;
            --dashboard-bg: #e8f5e9;
            --dashboard-border: #c8e6c9;
            --dashboard-text: #2e7d32;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --card-bg: #1e1e1e;
            --card-border: #2c2c2c;
            --box-shadow: rgba(0,0,0,0.3);
            --label-color: #bbbbbb;
            --secondary-text: #aaaaaa;
            --badge-bg: #2d372d;
            --input-bg: #252525;
            --input-border: #444444;
            --dashboard-bg: #1b3820;
            --dashboard-border: #2d5a32;
            --dashboard-text: #81c784;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: 15px; 
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .theme-toggle-btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--input-border);
            padding: 8px 12px;
            font-size: 13px;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 2px 4px var(--box-shadow);
            font-weight: 600;
        }

        .favorite-badge {
            font-size: 13px;
            color: #2e7d32;
            background-color: #e8f5e9;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
        }
        [data-theme="dark"] .favorite-badge {
            color: #81c784;
            background-color: #1b3820;
        }

        h1 {
            font-size: 24px;
            color: #2e7d32;
            text-align: center;
            margin-top: 10px;
            margin-bottom: 5px;
        }
        [data-theme="dark"] h1 { color: #81c784; }
        
        #subtitle {
            font-size: 14px;
            color: var(--secondary-text);
            text-align: center;
            margin-bottom: 25px;
        }

        /* 全域今日天時資訊牌 */
        .global-dashboard {
            background-color: var(--dashboard-bg);
            border: 1px solid var(--dashboard-border);
            color: var(--text-color);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px var(--box-shadow);
        }
        .dashboard-title {
            font-size: 16px;
            font-weight: bold;
            color: var(--dashboard-text);
            margin-top: 0;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }
        .dashboard-item {
            font-size: 13px;
            line-height: 1.5;
        }
        .dashboard-item strong {
            color: var(--dashboard-text);
        }
        .dashboard-warning-area {
            grid-column: 1 / -1;
            border-top: 1px dashed var(--input-border);
            padding-top: 8px;
            margin-top: 4px;
        }

        .search-box { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: 0 4px 12px var(--box-shadow); 
            margin-bottom: 20px;
            border: 1px solid var(--card-border);
        }

        .filter-group { margin-bottom: 15px; }

        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            font-size: 15px;
            color: var(--label-color);
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border-radius: 10px;
            border: 1px solid var(--input-border);
            background-color: var(--input-bg);
            color: var(--text-color);
            box-sizing: border-box;
        }

        .tags-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 5px;
        }
        .filter-tag-btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--input-border);
            padding: 6px 14px;
            font-size: 13px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .filter-tag-btn.active {
            background-color: #2e7d32;
            color: white;
            border-color: #2e7d32;
        }
        [data-theme="dark"] .filter-tag-btn.active {
            background-color: #81c784;
            color: #121212;
            border-color: #81c784;
        }

        select, .main-search-btn, .gps-btn { 
            width: 100%; 
            padding: 14px; 
            font-size: 16px; 
            border-radius: 10px; 
            border: 1px solid var(--input-border); 
            background-color: var(--input-bg);
            color: var(--text-color);
            box-sizing: border-box;
        }

        .main-search-btn { 
            background-color: #2e7d32; 
            color: white; 
            border: none; 
            font-weight: bold;
            cursor: pointer; 
            margin-top: 15px;
            box-shadow: 0 4px 6px rgba(46, 125, 50, 0.2);
        }

        .gps-btn {
            background-color: #0288d1;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(2, 136, 209, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .route-card {
            position: relative; 
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px var(--box-shadow);
            border: 1px solid var(--card-border);
        }
        .route-title {
            font-size: 18px;
            font-weight: bold;
            color: #2e7d32;
            margin: 0 0 8px 0;
            padding-right: 35px; 
        }
        [data-theme="dark"] .route-title { color: #81c784; }

        .love-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
        }

        .route-details {
            font-size: 14px;
            color: var(--secondary-text);
            margin-bottom: 12px;
        }
        .route-details span {
            display: inline-block;
            background: var(--badge-bg);
            color: var(--text-color);
            padding: 4px 8px;
            border-radius: 4px;
            margin-right: 5px;
            margin-bottom: 5px;
            font-size: 12px;
        }

        .gps-distance-tag {
            background-color: #e1f5fe !important;
            color: #0288d1 !important;
            font-weight: 600;
        }

        .elevation-wrapper {
            margin: 12px 0;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            padding: 10px;
            border-radius: 8px;
        }
        .elevation-title {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }
        .elevation-bar {
            display: flex;
            height: 14px;
            border-radius: 7px;
            overflow: hidden;
            background: #e0e0e0;
        }
        .elev-part {
            height: 100%;
            transition: width 0.3s;
        }
        .elev-flat { background-color: #4caf50; }  
        .elev-stairs { background-color: #ff9800; }
        .elev-steep { background-color: #f44336; } 
        
        .elevation-legend {
            display: flex;
            gap: 10px;
            font-size: 11px;
            margin-top: 5px;
            color: var(--secondary-text);
        }
        .legend-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 3px;
        }

        .card-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            width: 100%;
            margin-top: 10px;
        }

        .ask-ai-btn, .nav-btn, .map-btn, .gpx-btn {
            display: inline-block;
            flex: 1 1 calc(50% - 4px); 
            padding: 12px 8px;
            font-size: 13px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            box-sizing: border-box;
            border: none;
            cursor: pointer;
        }

        .ask-ai-btn {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }
        [data-theme="dark"] .ask-ai-btn {
            background-color: #1b3820;
            color: #81c784;
            border: 1px solid #2d5a32;
        }

        .nav-btn { background-color: #1a73e8; color: white; }
        .gpx-btn { background-color: #7b1fa2; color: white; } 
        .map-btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--input-border);
        }

        .warning-alert-orange {
            color: #e65100 !important;
            font-weight: bold;
            background-color: #fff3e0;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #ffe0b2;
            display: block;
            margin-top: 12px;
            line-height: 1.5;
        }
        [data-theme="dark"] .warning-alert-orange {
            background-color: #3e2723;
            color: #ffb74d !important;
            border: 1px solid #5d4037;
        }

        .offline-alert {
            background-color: #ff9800 !important;
            color: white !important;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 6px;
            display: block;
            margin-bottom: 10px;
            text-align: center;
        }

        .forecast-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .forecast-card {
            flex: 1;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
        }
        .forecast-card-title {
            font-weight: bold;
            color: #2e7d32;
            margin-bottom: 4px;
        }
        [data-theme="dark"] .forecast-card-title { color: #81c784; }

        .eta-badge {
            background-color: #fff3e0;
            color: #e65100;
            border: 1px solid #ffe0b2;
            font-weight: bold;
        }

        .card-ai-box {
            margin-top: 15px;
            padding: 15px;
            background-color: var(--card-bg);
            border-left: 5px solid #2e7d32;
            border-radius: 4px 12px 12px 4px;
            border: 1px solid var(--card-border);
            transition: all 0.3s ease;
        }

        .ai-safety-box {
            background-color: #fff0f0;
            border: 1px solid #ffcccc;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            font-size: 13px;
        }
        [data-theme="dark"] .ai-safety-box {
            background-color: #2c1a1a;
            border: 1px solid #5c2c2c;
        }

        .photo-box {
            background-color: #fff8e1;
            border: 1px solid #ffe082;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            font-size: 13px;
        }
        [data-theme="dark"] .photo-box {
            background-color: #2d2615;
            border: 1px solid #5d4f2a;
        }

        .ai-suggestion-content {
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }
        .ai-suggestion-content p { margin: 6px 0; font-size: 14px; }
        .ai-gear-list {
            list-style: none;
            padding-left: 0;
            margin: 10px 0 0 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 8px;
        }
        .ai-gear-list li {
            font-size: 13px;
            padding: 6px 10px;
            background-color: var(--card-bg);
            border: 1px solid var(--input-border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .direction-switch-container {
            display: flex;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .direction-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 8px;
            font-size: 13px;
            font-weight: bold;
            color: var(--secondary-text);
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .direction-btn.active {
            background-color: #2e7d32;
            color: white;
        }
        [data-theme="dark"] .direction-btn.active {
            background-color: #81c784;
            color: #121212;
        }

        .water-danger-notice {
            background-color: #fff3e0;
            border-left: 4px solid #ff9800;
            padding: 10px;
            font-size: 13px;
            margin-top: 8px;
            border-radius: 4px;
            color: #e65100;
            font-weight: 500;
        }
        [data-theme="dark"] .water-danger-notice { background-color: #2b1d10; color: #ffb74d; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button id="theme-toggle" class="theme-toggle-btn">🌙 切換黑夜模式</button>
        <div id="favorite-count" class="favorite-badge">已收藏 0 條路線</div>
    </div>

    <h1>⛰️ HikingRice 香港行山搜尋</h1>
    <p id="subtitle">尋找你的下一條行山路線 x 專業安全撤退精算教練</p>

    <div id="global-astro-dashboard" class="global-dashboard">
        <p class="dashboard-title">☀️ 今日香港全域客觀天時與天文台動態狀態</p>
        <div class="dashboard-grid">
            <div class="dashboard-item">
                🌆 客觀日落時間：<strong id="dash-sunset-time">19:10</strong><br>

            </div>
            <div class="dashboard-item">
                🌡️ 實時核心天氣：<span id="dash-general-weather">正在獲取大盤數據...</span><br>
                ⏳ 距離天黑倒數：<span id="dash-countdown" style="font-weight: bold;">-- 小時 -- 分鐘</span>
            </div>
            <div id="dash-warning-box" class="dashboard-item dashboard-warning-area">
                ⚠️ 天文台實時警告狀態：<span id="dash-warning-text" style="color: #2e7d32; font-weight: bold;">🟢 目前無惡劣天氣警告</span>
            </div>
        </div>
    </div>

    <div class="search-box">
        <button id="gps-btn" class="gps-btn">📍 自動定位：計算附近路線及車程</button>

        <div class="filter-group">
            <label for="keyword-input">關鍵字搜尋：</label>
            <input type="text" id="keyword-input" placeholder="搜尋景觀、起點或關鍵字（如：芒草、大峽谷）...">
        </div>

        <div class="filter-group">
            <label>熱門路線標籤 (可多選)：</label>
            <div id="tags-cloud" class="tags-cloud"></div>
        </div>

        <div class="filter-group">
            <label for="region-select">選擇地區：</label>
            <select id="region-select">
                <option value="all">-- 所有地區 --</option>
                <option value="sai-kung">西貢區 (例如：麥理浩徑、西灣亭)</option>
                <option value="hk-island">港島區 (例如：龍脊、太平山頂)</option>
                <option value="lantau">大嶼山 (例如：大東山、鳳凰山)</option>
                <option value="new-territories">新界 (例如：大帽山、城門水塘)</option>
            </select>
        </div>

        <div style="display: flex; gap: 10px; width: 100%; box-sizing: border-box;" class="filter-group">
            <div style="flex: 1;">
                <label for="user-level-select">🧘 我的行山能力：</label>
                <select id="user-level-select">
                    <option value="beginner">🐣 行山新手 (年資短/體力一般)</option>
                    <option value="intermediate" selected>🏃 經驗豐富 (有規律運動/行過中級山)</option>
                    <option value="expert">🧗 資深老手 (極佳體能/精通陡峭地形)</option>
                </select>
            </div>
            <div style="flex: 1;">
                <label for="user-weight-input">⚖️ 我的體重 (kg)：</label>
                <input type="number" id="user-weight-input" value="70" min="30" max="150">
            </div>
        </div>

        <div style="display: flex; gap: 10px; width: 100%; box-sizing: border-box;" class="filter-group">
            <div style="flex: 1;">
                <label for="diff-select">難度級別：</label>
                <select id="diff-select">
                    <option value="all">-- 所有難度 --</option>
                    <option value="1">★☆☆☆☆ 新手入門</option>
                    <option value="2">★★☆☆☆ 輕鬆休閒</option>
                    <option value="3">★★★☆☆ 中等難度</option>
                    <option value="4">★★★★☆ 進階挑戰</option>
                    <option value="5">★★★★★ 挑戰極限</option>
                </select>
            </div>
            <div style="flex: 1;">
                <label for="duration-select">⏱️ 您的個人化實際耗時篩選：</label>
                <select id="duration-select">
                    <option value="all">不限時數</option>
                    <option value="2">2 小時內搞定</option>
                    <option value="4">4 小時內搞定</option>
                    <option value="6">6 小時內搞定</option>
                </select>
            </div>
        </div>

        <div class="filter-group">
            <label for="sort-select">結果排序：</label>
            <select id="sort-select">
                <option value="default">預設排序</option>
                <option value="distance-asc">距離：由短到長</option>
                <option value="diff-asc">難度：由低到高</option>
            </select>
        </div>

        <button id="search-btn" class="main-search-btn">🔍 幫我推薦專屬路線</button>
    </div>

    <div id="results-list" style="margin-top: 25px;"></div>

        function calculateHaversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a))); 
        }

        // 規範 4：動態雙向耗時與 Aitken 膝關節落坡阻力算式
        function computeRouteETA(route, userLevel, currentTemp, currentHumidity, warningRaw, isReverse = false) {
            const distance = route.distanceNum; 
            
            // 雙向高度切換
            const gain = isReverse ? route.loss : route.gain;
            const loss = isReverse ? route.gain : route.loss;
            
            let terrain = route.terrainFactor || 1.0; 

            // 高溫與暴曬修正加權
            const hasHeatWarning = (warningRaw || "").includes("酷熱天氣") || (warningRaw || "").includes("工作暑熱");
            if (hasHeatWarning) {
                terrain *= 1.15;
            }
            
            const weightInput = document.getElementById('user-weight-input');
            const userWeight = weightInput ? parseFloat(weightInput.value) || 70 : 70;

            // 基礎爬升耗時
            let baseMinutes = distance * 13.3;
            const ascentPenaltyPer100m = userWeight > 80 ? 12.5 : 10;
            let climbingMinutes = (gain / 100) * ascentPenaltyPer100m;
            let totalEstimatedMinutes = (baseMinutes + climbingMinutes) * terrain;

            // 下坡膝關節阻力懲罰演算法 (Aitken 改良)
            // 每下降 300 米加 10 分鐘；若坡度陡峭（terrainFactor >= 1.3），每下降 300 米加 20 分鐘
            const lossPenaltyMinutes = (route.terrainFactor >= 1.3) ? 20 : 10;
            let kneePenaltyMinutes = (loss / 300) * lossPenaltyMinutes;
            totalEstimatedMinutes += kneePenaltyMinutes;

            // 行山能力層級係數
            let levelFactor = 1.0;
            if (userLevel === 'beginner') levelFactor = 1.35;
            else if (userLevel === 'expert') levelFactor = 0.75;
            totalEstimatedMinutes *= levelFactor;

            // 額外微觀天氣阻力加權
            if (currentTemp >= 32) totalEstimatedMinutes += (distance * 4);
            else if (currentTemp >= 29) totalEstimatedMinutes += (distance * 2);
            if (currentHumidity >= 85 && currentTemp >= 27) totalEstimatedMinutes *= 1.05;

            return parseFloat(Math.max(totalEstimatedMinutes / 60, 0.5).toFixed(1));
        }

        // 規範 4：生理補水量精準修正
        function calculateWaterNeed(duration, temp, difficulty) {
            let water = 0.5 * parseFloat(duration); // 基礎補水量 = 每小時消耗 500ml * 預估時數
            if (parseFloat(temp) >= 30) water += 0.6;
            if (parseInt(difficulty) >= 4) water += 0.4; 
            return parseFloat(Math.max(water, 0.5).toFixed(1));
        }

        function generateGearList(difficulty, temp, humidity, uv, duration) {
            let gear = ["基本急救包", "離線地圖 APP", "隨身火牛"];
            if (uv >= 6) gear.push("防曬裝備", "遮陽帽");
            if (humidity >= 85) gear.push("替換排汗衣物");
            if (parseInt(difficulty) >= 3) gear.push("專業行山鞋", "登山杖");
            if (duration >= 4) gear.push("高熱量行動糧");
            return gear;
        }

            const gpxString = `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="HikingRice" xmlns="http://www.topografix.com/GPX/1/1">
  <metadata>
    <name>${route.name}</name>
    <desc>起點: ${route.start} - 終點: ${route.end} | 總爬升: ${route.gain}m / 下降: ${route.loss}m</desc>
  </metadata>
  <trk>
    <name>${route.name} 離線軌跡</name>
    <trkseg>
      <trkpt lat="${startPts[0].trim()}" lon="${startPts[1].trim()}"></trkpt>
      <trkpt lat="${endPts[0].trim()}" lon="${endPts[1].trim()}"></trkpt>
    </trkseg>
  </trk>
</gpx>`;

            const blob = new Blob([gpxString], { type: 'application/gpx+xml;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `${route.name}_離線地圖點.gpx`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

            const sunsetTotalMinutes = GLOBAL_SUNSET_HOUR * 60 + GLOBAL_SUNSET_MIN;
            const diffMinutes = sunsetTotalMinutes - currentTotalMinutes;

            document.getElementById('dash-sunset-time').innerText = `${GLOBAL_SUNSET_HOUR}:${GLOBAL_SUNSET_MIN}`;
            document.getElementById('dash-magic-hour').innerText = `${GLOBAL_SUNSET_HOUR - 1}:${GLOBAL_SUNSET_MIN} - ${GLOBAL_SUNSET_HOUR}:${GLOBAL_SUNSET_MIN}`;
            
            if (generalTemp && generalHumid) {
                document.getElementById('dash-general-weather').innerText = `大盤均溫 ${generalTemp}°C | 濕度 ${generalHumid}%`;
            } else {
                document.getElementById('dash-general-weather').innerText = `環境氣象算力穩定`;
            }

            const countdownElem = document.getElementById('dash-countdown');
            if (diffMinutes > 0) {
                const h = Math.floor(diffMinutes / 60);
                const m = diffMinutes % 60;
                countdownElem.innerText = `餘 ${h} 小時 ${m} 分鐘`;
                countdownElem.style.color = 'inherit';
            } else {
                countdownElem.innerText = `日落天黑 (注意保命照明)`;
                countdownElem.style.color = '#d9381e';
            }

            const warnText = document.getElementById('dash-warning-text');
            if (warningMessage && warningMessage.trim() !== "" && !warningMessage.includes("目前無惡劣天氣警告")) {
                warnText.innerText = warningMessage;
                warnText.style.color = '#d9381e';

                warnText.style.color = '#2e7d32';
            }
        }

                    card.querySelector('.gpx-btn').addEventListener('click', () => { exportRouteGPX(route); });
                    card.querySelector('.love-btn').addEventListener('click', function() {
                        const idx = savedFavorites.indexOf(route.name);
                        if (idx === -1) { savedFavorites.push(route.name); this.innerText = '❤️'; }
                        else { savedFavorites.splice(idx, 1); this.innerText = '🤍'; }
                        localStorage.setItem('hikingFavorites', JSON.stringify(savedFavorites));
                        favoriteCountSpan.innerText = `已收藏 ${savedFavorites.length} 條路線`;
                    });

                    resultsList.appendChild(card);
                });
            } else {
                resultsList.innerHTML = `
                    <div style="text-align:center; padding: 30px; background: var(--card-bg); border-radius: 12px; border: 1px dashed var(--input-border); margin-top:20px;">
                        <p style="color:#999; font-size: 15px; margin-bottom: 15px;">🔍 沒有找到完全符合條件的路線。</p>
                        <button id="reset-filters-btn" style="background-color: #0288d1; color: white; border: none; padding: 10px 20px; font-size: 14px; border-radius: 20px; font-weight: bold; cursor: pointer;">🔄 清除重選（重新搵過）</button>
                    </div>`;
                document.getElementById('reset-filters-btn').addEventListener('click', () => {
                    document.getElementById('keyword-input').value = '';
                    document.getElementById('region-select').value = 'all';
                    document.getElementById('diff-select').value = 'all';
                    document.getElementById('duration-select').value = 'all';
                    selectedTags = [];
                    document.querySelectorAll('.filter-tag-btn').forEach(btn => btn.classList.remove('active'));
                    searchBtn.click();
                });
            }
        });

        // 規範 1：徹底修復天文台 API 變動防護機制
        async function fetchHKWeatherAndForecast(targetStation) {
            let isOffline = false;
            let currentData = null;
            let forecastData = null;

            try {
                const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
                currentData = await res.json();
                localStorage.setItem('cache_current_weather', JSON.stringify(currentData));
            } catch (e) {
                isOffline = true;
                const cached = localStorage.getItem('cache_current_weather');
                currentData = cached ? JSON.parse(cached) : MOCK_WEATHER_CURRENT;
            }

            try {
                const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=tc');
                forecastData = await res.json();
                localStorage.setItem('cache_forecast_weather', JSON.stringify(forecastData));
            } catch (e) {
                isOffline = true;
                const cached = localStorage.getItem('cache_forecast_weather');
                forecastData = cached ? JSON.parse(cached) : MOCK_WEATHER_FORECAST;
            }

            if (!currentData) currentData = MOCK_WEATHER_CURRENT;
            if (!forecastData || !forecastData.weatherForecast) forecastData = MOCK_WEATHER_FORECAST;

            let matchedTemp = 25;
            if (currentData.temperature && currentData.temperature.data) {
                const found = currentData.temperature.data.find(item => item.place.includes(targetStation));
                matchedTemp = found ? found.value : (currentData.temperature.data.find(item => item.place === "天文台")?.value ?? 25);
            }

            let hkHumidity = currentData.humidity?.data?.[0]?.value ?? 75;
            let hkUvIndex = currentData.uvIndex?.data?.[0]?.value ?? 0;

            // 嚴格判定型態，防止空字串 .forEach 卡死搜尋
            let warningTexts = [];
            if (currentData.warningMessage) {
                if (Array.isArray(currentData.warningMessage)) {
                    currentData.warningMessage.forEach(msg => { if (msg) warningTexts.push(msg); });
                } else if (typeof currentData.warningMessage === 'string' && currentData.warningMessage.trim() !== "") {
                    warningTexts.push(currentData.warningMessage);
                }
            }
            
            let warningRawString = warningTexts.length > 0 ? warningTexts.join('、') : "🟢 目前無惡劣天氣警告";

            let textForecastList = [];
            let futureRainOrThunderAlert = false;
            const threeDayForecast = forecastData.weatherForecast.slice(0, 3);

            if (threeDayForecast.length > 0) {
                threeDayForecast.forEach(day => {
                    textForecastList.push({
                        week: day.week ?? "明天", 
                        tempRange: `${day.forecastMinTemp?.value ?? 22}-${day.forecastMaxTemp?.value ?? 28}°C`, 
                        psr: day.PSR ?? "低", 
                        uv: day.forecastMaxUV?.value ?? 0
                    });
                    if ((day.forecastWeather ?? "").includes('雨') || (day.forecastWeather ?? "").includes('雷')) futureRainOrThunderAlert = true;
                });
            } else {
                textForecastList = [
                    { week: "明天", tempRange: "24-29°C", psr: "低", uv: 5 },
                    { week: "後天", tempRange: "25-30°C", psr: "中", uv: 6 }
                ];
            }

            return { 
                temp: matchedTemp, 
                humidity: hkHumidity, 
                uv: hkUvIndex, 
                warningRaw: warningRawString, 
                isOffline: isOffline, 
                textForecastList: textForecastList, 
                futureRainOrThunderAlert: futureRainOrThunderAlert 
            };
        }

        // 規範 4：動態狀況模擬（傷膝落坡、週末等車加權、補水低鈉警示）
        async function triggerCardAI(route, currentCardElement, isReverseMode = false) {
            const aiBox = currentCardElement.querySelector('.card-ai-box');
            
            if (!isReverseMode) {
                document.querySelectorAll('.card-ai-box').forEach(box => {
                    if (box !== aiBox) { box.style.display = 'none'; box.innerHTML = ''; }
                });
                aiBox.style.display = 'block';
            }
            
            aiBox.innerHTML = `<div style="color: var(--secondary-text); font-style: italic;">AI 精算教練正在分析路段高度阻力... 🕒</div>`;
            aiBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            const weather = await fetchHKWeatherAndForecast(route.station);

            let transitRoundTripHours = 2.0; 
            if (userLocation) {
                const startParts = route.startCoords.split(',');
                const distanceKM = calculateHaversineDistance(userLocation.lat, userLocation.lng, parseFloat(startParts[0]), parseFloat(startParts[1]));
                transitRoundTripHours = parseFloat((((distanceKM * 3) + 20) * 2 / 60).toFixed(1));
            }

            // 週末 15:00-18:00 等車交通冗餘加權 50 分鐘
            const now = new Date();
            const currentDay = now.getDay(); 
            const currentHour = now.getHours();
            let weekendQueuePenaltyHours = 0;
            if ((currentDay === 0 || currentDay === 6) && (currentHour >= 15 && currentHour < 18)) {
                weekendQueuePenaltyHours = 50 / 60; 
            }

            const userLevel = document.getElementById('user-level-select').value;
            const dynamicETA = computeRouteETA(route, userLevel, weather.temp, weather.humidity, weather.warningRaw, isReverseMode);
            const totalJourneyTime = parseFloat((transitRoundTripHours + dynamicETA + weekendQueuePenaltyHours).toFixed(1));
            
            const scientificWater = calculateWaterNeed(dynamicETA, weather.temp, route.difficulty);
            const tailoredGearList = generateGearList(route.difficulty, weather.temp, weather.humidity, weather.uv, dynamicETA);

            // 應變極限時間精算
            const sunsetTotalMinutes = GLOBAL_SUNSET_HOUR * 60 + GLOBAL_SUNSET_MIN; 
            const escapeConfig = route.escapePoint || { name: "中途點", method: "原路返回", cutoffPercent: 0.5 };
            const minutesToFinishFromEscape = dynamicETA * (1 - escapeConfig.cutoffPercent) * 60;
            const cutoffTotalMinutes = sunsetTotalMinutes - minutesToFinishFromEscape - 30; 
            const cutoffHour = Math.floor(cutoffTotalMinutes / 60);
            const cutoffMin = Math.floor(cutoffTotalMinutes % 60);
            const cutoffTimeStr = `${cutoffHour.toString().padStart(2, '0')}:${cutoffMin.toString().padStart(2, '0')}`;

            // 核心安全防禦：天黑比對
            const currentHourDecimal = now.getHours() + (now.getMinutes() / 60);
            const estimatedFinishedHour = currentHourDecimal + dynamicETA;
            const sunsetHourDecimal = GLOBAL_SUNSET_HOUR + (GLOBAL_SUNSET_MIN / 60);

            let nightWarningHTML = "";
            if (estimatedFinishedHour >= sunsetHourDecimal) {
                nightWarningHTML = `
                    <div class="warning-alert-orange" style="border-left: 5px solid #d9381e;">
                        ⚠️【天黑落山嚴格警告】<br>
                        當前開步時間較晚，依據目前${isReverseMode ? '逆行' : '順行'}地形估算之行山耗時為 ${dynamicETA} 小時，這將導致您的預計落山時間【遲過】今日客觀日落時間（${GLOBAL_SUNSET_HOUR}:${GLOBAL_SUNSET_MIN}）。強烈建議縮短行程，或必須在背包內備妥專業照明頭燈！
                    </div>`;
            }

            let waterNoticeHTML = "";
            if (scientificWater > 2.5) {
                waterNoticeHTML = `<div class="water-danger-notice">⚠️ 建議其中 500ml 必須為電解質運動飲料，以防低鈉血症（水中毒）。</div>`;
            }

            let forecastHTML = '';
            weather.textForecastList.forEach(item => {
                forecastHTML += `
                    <div class="forecast-card">
                        <div class="forecast-card-title">${item.week}</div>
                        <div>${item.tempRange}</div>
                        <div>🌧️: ${item.psr}</div>
                    </div>`;
            });

            let aiReport = `【AI 狀況模擬報告】\n`;
            aiReport += `📡 當前分區天氣：溫度 ${weather.temp}°C | 濕度 ${weather.humidity}%\n`;
            if (weather.warningRaw.includes("酷熱天氣") || weather.warningRaw.includes("工作暑熱")) {
                aiReport += `🔥 酷熱/暑熱警告生效中：阻力增幅 1.15 倍，已精算暴曬體能耗損。\n`;
            }
            aiReport += `🧗 關節負荷：${isReverseMode ? '逆行' : '順行'}下坡高度為 ${isReverseMode ? route.gain : route.loss}米。系統已加入 Aitken 改良版下坡阻力時間懲罰。`;

            aiBox.innerHTML = `
                <div class="offline-alert" style="display: ${weather.isOffline ? 'block' : 'none'};">📴 已啟用本機全離線保命機制</div>
                
                <h4 style="margin-top: 0; color: #2e7d32; margin-bottom: 12px;">🤖 AI 個人化體能與安全精算面板：</h4>
                
                <div class="direction-switch-container">
                    <button class="direction-btn ${!isReverseMode ? 'active' : ''}" id="dir-forward-btn">順行 (${route.start} → ${route.end})</button>
                    <button class="direction-btn ${isReverseMode ? 'active' : ''}" id="dir-reverse-btn">逆行 (${route.end} → ${route.start})</button>
                </div>

                <div style="margin-bottom: 12px; font-size: 14px; line-height: 1.6;">
                    <div style="font-weight: bold; color: #2e7d32;">⏱️ AI 個人純行山淨耗時：${dynamicETA} 小時</div>
                    <div style="font-weight: bold; color: #1a73e8;">🚌 當日行程總預估時數（含交通）：約 ${totalJourneyTime} 小時 ${weekendQueuePenaltyHours > 0 ? '<span style="color:#d9381e;">(內含週末15-18點等車排隊冗餘)</span>' : ''}</div>
                </div>

                <div class="ai-safety-box">
                    <strong style="color: #c62828;">🚨 安全防禦撤退機制</strong><br>
                    • 最佳防禦撤退點：<strong>${escapeConfig.name}</strong><br>
                    • 撤退點轉向【極限截止時間】：<span style="color: #c62828; font-weight: bold;">${cutoffTimeStr} 之前</span><br>
                    • 撤退應變：${escapeConfig.method}。
                </div>

                <div class="photo-box">
                    <strong style="color: #f57c00;">📸 攝影與構圖提示</strong><br>
                    • 亮點景觀：${route.views}。魔幻時刻光影絕佳，但切記注意腳底，安全第一。
                </div>

                <div style="margin-bottom: 5px; font-weight: bold; font-size: 13px;">📅 未來趨勢摘要</div>
                <div class="forecast-container">${forecastHTML}</div>

                <p style="white-space: pre-line; line-height: 1.6; font-size: 13px; margin-top: 10px;">${aiReport}</p>

                <div class="ai-suggestion-content">
                    <p>💧 <strong>動態攜水量推薦：</strong> <span style="color: #e65100; font-weight: bold; font-size: 16px;">${scientificWater}</span> 公升</p>
                    ${waterNoticeHTML}
                    <p style="margin-top: 12px; font-weight: 600;">🎒 智能配置動態裝備：</p>
                    <ul class="ai-gear-list">
                        ${tailoredGearList.map(item => `<li>✅ ${item}</li>`).join('')}
                    </ul>
                </div>
                
                ${nightWarningHTML}
            `;

            aiBox.querySelector('#dir-forward-btn').addEventListener('click', () => { triggerCardAI(route, currentCardElement, false); });
            aiBox.querySelector('#dir-reverse-btn').addEventListener('click', () => { triggerCardAI(route, currentCardElement, true); });
        }

        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeToggleBtn.innerText = savedTheme === 'dark' ? '☀️ 白天模式' : '🌙 黑夜模式';
        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            themeToggleBtn.innerText = newTheme === 'dark' ? '☀️ 白天模式' : '🌙 黑夜模式';
            localStorage.setItem('theme', newTheme);
        });

        initTagsUI();
        favoriteCountSpan.innerText = `已收藏 ${savedFavorites.length} 條路線`;
        
        (async function initDashboard() {
            try {
                const currentRouteOne = hikingRoutes[0];
                const weatherData = await fetchHKWeatherAndForecast(currentRouteOne.station);
                updateGlobalDashboardAstro(weatherData.warningRaw, weatherData.temp, weatherData.humidity);
            } catch(e) {
                updateGlobalDashboardAstro("🟢 目前無惡劣天氣警告", 25, 75);
            }
            searchBtn.click();
        })();

        setInterval(async () => {
            const currentRouteOne = hikingRoutes[0];
            const weatherData = await fetchHKWeatherAndForecast(currentRouteOne.station);
            updateGlobalDashboardAstro(weatherData.warningRaw, weatherData.temp, weatherData.humidity);
        }, 60000);
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swBlob = new Blob([`
                    const CACHE_NAME = 'hiking-rice-v6';
                    const ASSETS = ['./', './index.html'];
                    self.addEventListener('install', e => {
                        e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(ASSETS)));
                    });
                    self.addEventListener('fetch', e => {
                        e.respondWith(
                            caches.match(e.request).then(res => res || fetch(e.request).catch(() => caches.match('./index.html')))
                        );
                    });
                `], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(swBlob);
                navigator.serviceWorker.register(swUrl).catch(err => console.log('SW Error: ', err));
            });
        }
    </script>
