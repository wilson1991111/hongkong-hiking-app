<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港 AI 行山路線搜尋 - 最終GPS智能版</title>
    <style>
        :root {
            --bg-color: #f7f9f7;
            --text-color: #333333;
            --card-bg: #ffffff;
            --card-border: #eef2ee;
            --box-shadow: rgba(0,0,0,0.05);
            --label-color: #444444;
            --secondary-text: #666666;
            --badge-bg: #f0f4f0;
            --input-bg: #fafafa;
            --input-border: #e0e0e0;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --card-bg: #1e1e1e;
            --card-border: #2c2c2c;
            --box-shadow: rgba(0,0,0,0.3);
            --label-color: #bbbbbb;
            --secondary-text: #aaaaaa;
            --badge-bg: #2d372d;
            --input-bg: #252525;
            --input-border: #444444;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: 15px; 
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .theme-toggle-btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--input-border);
            padding: 8px 12px;
            font-size: 13px;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 2px 4px var(--box-shadow);
            font-weight: 600;
        }

        .favorite-badge {
            font-size: 13px;
            color: #2e7d32;
            background-color: #e8f5e9;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
        }
        [data-theme="dark"] .favorite-badge {
            color: #81c784;
            background-color: #1b3820;
        }

        h1 {
            font-size: 24px;
            color: #2e7d32;
            text-align: center;
            margin-top: 10px;
            margin-bottom: 5px;
        }
        [data-theme="dark"] h1 { color: #81c784; }
        
        #subtitle {
            font-size: 14px;
            color: var(--secondary-text);
            text-align: center;
            margin-bottom: 25px;
        }

        .search-box { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: 0 4px 12px var(--box-shadow); 
            margin-bottom: 20px;
            border: 1px solid var(--card-border);
        }

        .filter-group { margin-bottom: 15px; }

        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            font-size: 15px;
            color: var(--label-color);
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border-radius: 10px;
            border: 1px solid var(--input-border);
            background-color: var(--input-bg);
            color: var(--text-color);
            box-sizing: border-box;
        }

        .tags-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 5px;
        }
        .filter-tag-btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--input-border);
            padding: 6px 14px;
            font-size: 13px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .filter-tag-btn.active {
            background-color: #2e7d32;
            color: white;
            border-color: #2e7d32;
        }
        [data-theme="dark"] .filter-tag-btn.active {
            background-color: #81c784;
            color: #121212;
            border-color: #81c784;
        }

        select, .main-search-btn, .gps-btn { 
            width: 100%; 
            padding: 14px; 
            font-size: 16px; 
            border-radius: 10px; 
            border: 1px solid var(--input-border); 
            background-color: var(--input-bg);
            color: var(--text-color);
            box-sizing: border-box;
        }

        .main-search-btn { 
            background-color: #2e7d32; 
            color: white; 
            border: none; 
            font-weight: bold;
            cursor: pointer; 
            margin-top: 15px;
            box-shadow: 0 4px 6px rgba(46, 125, 50, 0.2);
        }

        .gps-btn {
            background-color: #0288d1;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(2, 136, 209, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .route-card {
            position: relative; 
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px var(--box-shadow);
            border: 1px solid var(--card-border);
        }
        .route-title {
            font-size: 18px;
            font-weight: bold;
            color: #2e7d32;
            margin: 0 0 8px 0;
            padding-right: 35px; 
        }
        [data-theme="dark"] .route-title { color: #81c784; }

        .love-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
        }

        .route-details {
            font-size: 14px;
            color: var(--secondary-text);
            margin-bottom: 16px;
        }
        .route-details span {
            display: inline-block;
            background: var(--badge-bg);
            color: var(--text-color);
            padding: 4px 8px;
            border-radius: 4px;
            margin-right: 5px;
            margin-bottom: 5px;
            font-size: 12px;
        }

        .gps-distance-tag {
            background-color: #e1f5fe !important;
            color: #0288d1 !important;
            font-weight: 600;
        }

        .card-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            width: 100%;
        }

        .ask-ai-btn, .nav-btn, .map-btn {
            display: inline-block;
            flex: 1 1 calc(50% - 4px); 
            padding: 12px 8px;
            font-size: 13px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            box-sizing: border-box;
            border: none;
            cursor: pointer;
        }

        .ask-ai-btn {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }
        [data-theme="dark"] .ask-ai-btn {
            background-color: #1b3820;
            color: #81c784;
            border: 1px solid #2d5a32;
        }

        .nav-btn { background-color: #1a73e8; color: white; }
        .map-btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--input-border);
            flex: 1 1 100%; 
            font-size: 14px;
        }

        .danger-alert {
            color: #d9381e !important;
            font-weight: bold;
            background-color: #fff0f0;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #ffcccc;
            display: inline-block;
            margin-top: 5px;
        }
        
        .warning-alert-orange {
            color: #e65100 !important;
            font-weight: bold;
            background-color: #fff3e0;
            padding: 10px 14px;
            border-radius: 6px;
            border: 1px solid #ffe0b2;
            display: block;
            margin-top: 10px;
            line-height: 1.5;
        }
        [data-theme="dark"] .warning-alert-orange {
            background-color: #3e2723;
            color: #ffb74d !important;
            border: 1px solid #5d4037;
        }

        .offline-alert {
            background-color: #ff9800 !important;
            color: white !important;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 6px;
            display: block;
            margin-bottom: 10px;
            text-align: center;
        }

        .forecast-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .forecast-card {
            flex: 1;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
        }
        .forecast-card-title {
            font-weight: bold;
            color: #2e7d32;
            margin-bottom: 4px;
        }
        [data-theme="dark"] .forecast-card-title { color: #81c784; }

        .eta-badge {
            background-color: #fff3e0;
            color: #e65100;
            border: 1px solid #ffe0b2;
            font-weight: bold;
        }
        [data-theme="dark"] .eta-badge {
            background-color: #3e2723;
            color: #ffb74d;
            border: 1px solid #5d4037;
        }

        .card-ai-box {
            margin-top: 15px;
            padding: 15px;
            background-color: var(--card-bg);
            border-left: 5px solid #2e7d32;
            border-radius: 4px 12px 12px 4px;
            border: 1px solid var(--card-border);
            border-left: 5px solid #2e7d32;
            transition: all 0.3s ease;
        }
        
        .weather-banner {
            background: #f1f8ff;
            border: 1px solid #c8e1ff;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 13px;
            color: #0366d6;
        }
        [data-theme="dark"] .weather-banner {
            background: #141d26;
            border: 1px solid #243342;
            color: #388bfd;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button id="theme-toggle" class="theme-toggle-btn">🌙 切換黑夜模式</button>
        <div id="favorite-count" class="favorite-badge">已收藏 0 條路線</div>
    </div>

    <h1>⛰️ HikingRice 香港行山搜尋</h1>
    <p id="subtitle">尋找你的下一條行山路線 x GPS 智能公車精算教練</p>

    <div class="search-box">
        <button id="gps-btn" class="gps-btn">📍 獲取我的位置計算距離與精確車程</button>

        <div class="filter-group">
            <label for="keyword-input">關鍵字搜尋：</label>
            <input type="text" id="keyword-input" placeholder="搜尋景觀、起點或關鍵字（如：芒草）...">
        </div>

        <div class="filter-group">
            <label>熱門路線標籤 (可多選)：</label>
            <div id="tags-cloud" class="tags-cloud"></div>
        </div>

        <div class="filter-group">
            <label for="region-select">選擇地區：</label>
            <select id="region-select">
                <option value="all">-- 所有地區 --</option>
                <option value="sai-kung">西貢 (例如：麥理浩徑)</option>
                <option value="hk-island">港島 (例如：龍脊)</option>
                <option value="lantau">大嶼山 (例如：大東山)</option>
            </select>
        </div>

        <div style="display: flex; gap: 10px; width: 100%; box-sizing: border-box;" class="filter-group">
            <div style="flex: 1;">
                <label for="diff-select">難度級別：</label>
                <select id="diff-select">
                    <option value="all">-- 所有難度 --</option>
                    <option value="1">★☆☆☆☆ 新手入門</option>
                    <option value="3">★★★☆☆ 中等難度</option>
                    <option value="5">★★★★★ 挑戰極限</option>
                </select>
            </div>
            <div style="flex: 1;">
                <label for="user-level-select">🧘 我的行山能力：</label>
                <select id="user-level-select">
                    <option value="beginner">🐣 行山新手 (年資短/體力一般)</option>
                    <option value="intermediate" selected>🏃 經驗豐富 (有規律運動/行過中級山)</option>
                    <option value="expert">🧗 資深老手 (極佳體能/精通陡峭地形)</option>
                </select>
            </div>
        </div>

        <!-- 1. 修改：已徹底移除原本的 #transport-select 的士/自駕選單，預設改用公共交通模擬算法 -->

        <div class="filter-group">
            <label for="duration-select">⏱️ 您的個人化實際耗時篩選：</label>
            <select id="duration-select">
                <option value="all">不限時數</option>
                <option value="2">2 小時內搞定</option>
                <option value="4">4 小時內搞定</option>
                <option value="6">6 小時內搞定</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="sort-select">結果排序：</label>
            <select id="sort-select">
                <option value="default">預設排序</option>
                <option value="distance-asc">距離：由短到長</option>
                <option value="diff-asc">難度：由低到高</option>
            </select>
        </div>

        <button id="search-btn" class="main-search-btn">搜尋個人化路線</button>
    </div>

    <!-- 路線卡片列表容器 -->
    <div id="results-list" style="margin-top: 25px;"></div>

    <script>
        const hikingRoutes = [
            { 
                name: "麥理浩徑第一、二段", 
                region: "sai-kung", 
                difficulty: "3", 
                start: "北潭涌", 
                end: "北潭凹", 
                distance: "24km", 
                distanceNum: 24,
                baseDuration: 7.0,
                station: "西貢",
                views: "海景/萬宜水庫",
                tags: ['海景', '萬宜水庫', '長途挑戰'],
                startCoords: "22.3957,114.3233",
                endCoords: "22.4289,114.3314"
            },
            { 
                name: "西灣亭至北潭凹", 
                region: "sai-kung", 
                difficulty: "3", 
                start: "西灣亭", 
                end: "北潭凹", 
                distance: "12km", 
                distanceNum: 12,
                baseDuration: 4.0,
                station: "西貢",
                views: "海景/大浪西灣",
                tags: ['海景', '大浪西灣', '新手推薦'],
                startCoords: "22.3994,114.3582",
                endCoords: "22.4289,114.3314"
            },
            { 
                name: "龍脊", 
                region: "hk-island", 
                difficulty: "1", 
                start: "土地灣", 
                end: "大浪灣", 
                distance: "8.5km", 
                distanceNum: 8.5,
                baseDuration: 3.0,
                station: "赤柱",
                views: "海景/石澳",
                tags: ['海景', '石澳', '新手推薦', '落日'],
                startCoords: "22.2312,114.2384",
                endCoords: "22.2435,114.2505"
            },
            { 
                name: "大東山", 
                region: "lantau", 
                difficulty: "5", 
                start: "伯公坳", 
                end: "梅窩", 
                distance: "9km", 
                distanceNum: 9,
                baseDuration: 4.5,
                station: "昂坪",
                views: "山景/芒草",
                tags: ['山景', '芒草', '高難度'],
                startCoords: "22.2562,113.9298",
                endCoords: "22.2576,113.9622"
            },
            { 
                name: "鳳凰山", 
                region: "lantau", 
                difficulty: "5", 
                start: "伯公坳", 
                end: "昂坪", 
                distance: "7km", 
                distanceNum: 7,
                baseDuration: 4.5,
                station: "昂坪",
                views: "山景/日出",
                tags: ['山景', '日出', '高難度'],
                startCoords: "22.2562,113.9298",
                endCoords: "22.2559,113.9048"
            }
        ];

        let userLocation = null; 
        let selectedTags = [];
        let savedFavorites = JSON.parse(localStorage.getItem('hikingFavorites')) || [];

        const searchBtn = document.getElementById('search-btn');
        const gpsBtn = document.getElementById('gps-btn');
        const keywordInput = document.getElementById('keyword-input');
        const tagsCloudDiv = document.getElementById('tags-cloud');
        const resultsList = document.getElementById('results-list');
        const favoriteCountSpan = document.getElementById('favorite-count');
        const themeToggleBtn = document.getElementById('theme-toggle');

        function initTagsUI() {
            const allTags = new Set();
            hikingRoutes.forEach(r => r.tags.forEach(t => allTags.add(t)));
            tagsCloudDiv.innerHTML = '';
            allTags.forEach(tag => {
                const btn = document.createElement('button');
                btn.className = 'filter-tag-btn';
                btn.innerText = `# ${tag}`;
                btn.addEventListener('click', () => {
                    if (selectedTags.includes(tag)) {
                        selectedTags = selectedTags.filter(t => t !== tag);
                        btn.classList.remove('active');
                    } else {
                        selectedTags.push(tag);
                        btn.classList.add('active');
                    }
                });
                tagsCloudDiv.appendChild(btn);
            });
        }

        function calculateHaversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a))); 
        }

        gpsBtn.addEventListener('click', () => {
            if (!navigator.geolocation) return;
            gpsBtn.innerText = "⏳ 定位中...";
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    gpsBtn.innerText = "✅ 定位成功";
                    searchBtn.click();
                },
                () => { gpsBtn.innerText = "❌ 定位失敗"; },
                { timeout: 5000 }
            );
        });

        function computeRouteETA(baseDuration, userLevel, currentTemp, currentHumidity) {
            let eta = baseDuration;
            if (userLevel === 'beginner') eta *= 1.4;
            else if (userLevel === 'expert') eta *= 0.85;

            if (currentTemp >= 30 || currentHumidity >= 85) {
                eta *= 1.15;
            }
            return parseFloat(eta.toFixed(1));
        }

        searchBtn.addEventListener('click', function() {
            const keyword = keywordInput.value.trim().toLowerCase();
            const selectedRegion = document.getElementById('region-select').value;
            const selectedDiff = document.getElementById('diff-select').value;
            const sortOption = document.getElementById('sort-select').value;
            const durationLimit = document.getElementById('duration-select').value;
            const userLevel = document.getElementById('user-level-select').value;
            
            resultsList.innerHTML = '';

            const cachedCurrent = JSON.parse(localStorage.getItem('cache_current_weather'));
            const testTemp = cachedCurrent?.temperature?.data?.[0]?.value ?? 25;
            const testHumid = cachedCurrent?.humidity?.data?.[0]?.value ?? 75;

            let results = hikingRoutes.filter(route => {
                const matchRegion = (selectedRegion === 'all' || route.region === selectedRegion);
                const matchDiff = (selectedDiff === 'all' || route.difficulty === selectedDiff);
                
                let matchKeyword = true;
                if (keyword !== '') {
                    matchKeyword = route.name.toLowerCase().includes(keyword) || 
                                   route.views.toLowerCase().includes(keyword) || 
                                   route.start.toLowerCase().includes(keyword);
                }
                
                let matchTags = true;
                if (selectedTags.length > 0) {
                    matchTags = selectedTags.every(tag => route.tags.includes(tag));
                }

                const personalTrueDuration = computeRouteETA(route.baseDuration, userLevel, testTemp, testHumid);
                let matchDuration = true;
                if (durationLimit !== 'all') {
                    const limitHours = parseFloat(durationLimit);
                    if (personalTrueDuration > limitHours) {
                        matchDuration = false;
                    }
                }

                return matchRegion && matchDiff && matchKeyword && matchTags && matchDuration;
            });

            if (sortOption === 'distance-asc') results.sort((a, b) => a.distanceNum - b.distanceNum);
            else if (sortOption === 'diff-asc') results.sort((a, b) => parseInt(a.difficulty) - parseInt(b.difficulty));

            if (results.length > 0) {
                results.forEach(route => {
                    const googleMapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${route.startCoords}&destination=${route.endCoords}&travelmode=walking`;
                    const transitUrl = `https://www.google.com/maps/dir/?api=1&destination=${route.startCoords}&travelmode=transit`;
                    const isFavorited = savedFavorites.includes(route.name);

                    let distanceString = "未知 (請點擊定位)";
                    let distanceClass = "";
                    let kmNum = 0;

                    if (userLocation) {
                        const startParts = route.startCoords.split(',');
                        kmNum = calculateHaversineDistance(userLocation.lat, userLocation.lng, parseFloat(startParts[0]), parseFloat(startParts[1]));
                        distanceString = `${kmNum.toFixed(2)} km`;
                        distanceClass = "gps-distance-tag";
                    }

                    const tagBadges = route.tags.map(t => `<span style="background:#e8f5e9; color:#2e7d32;">#${t}</span>`).join('');
                    
                    const card = document.createElement('div');
                    card.className = 'route-card';
                    card.innerHTML = `
                        <p class="route-title">📍 ${route.name}</p>
                        <button class="love-btn">${isFavorited ? '❤️' : '🤍'}</button>
                        <div class="route-details">
                            <span>🏃 全程 ${route.distance}</span>
                            <span class="eta-badge">⏱️ 基底: ${route.baseDuration}小時</span>
                            <span>📡 分區測量站: ${route.station}</span>
                            <span>🏁 ${route.start} → ${route.end}</span>
                            ${tagBadges}
                            <span class="${distanceClass}" data-km="${kmNum}">📍 距離你: ${distanceString}</span>
                        </div>
                        <div class="card-actions">
                            <button class="ask-ai-btn">🤖 AI 天氣與分區智能建議</button>
                            <a href="${transitUrl}" target="_blank" class="nav-btn">🚌 交通導航</a>
                            <a href="${googleMapsUrl}" target="_blank" class="map-btn">📍 路線完整地圖</a>
                        </div>
                        <div class="card-ai-box" style="display:none;"></div>
                    `;

                    card.querySelector('.ask-ai-btn').addEventListener('click', () => { triggerCardAI(route, card); });
                    card.querySelector('.love-btn').addEventListener('click', function() {
                        const idx = savedFavorites.indexOf(route.name);
                        if (idx === -1) { savedFavorites.push(route.name); this.innerText = '❤️'; }
                        else { savedFavorites.splice(idx, 1); this.innerText = '🤍'; }
                        localStorage.setItem('hikingFavorites', JSON.stringify(savedFavorites));
                        favoriteCountSpan.innerText = `已收藏 ${savedFavorites.length} 條路線`;
                    });

                    resultsList.appendChild(card);
                });
            } else {
                resultsList.innerHTML = `<p style="text-align:center; color:#999; margin-top:20px;">未搵到符合條件的個人化時數路線，建議將篩選放寬。</p>`;
            }
        });

        async function fetchHKWeatherAndForecast(targetStation) {
            let isOffline = false;
            let currentData = null;
            let forecastData = null;

            try {
                const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
                if (!res.ok) throw new Error("Network error");
                currentData = await res.json();
                localStorage.setItem('cache_current_weather', JSON.stringify(currentData));
            } catch (e) {
                isOffline = true;
                currentData = JSON.parse(localStorage.getItem('cache_current_weather'));
            }

            try {
                const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=tc');
                if (!res.ok) throw new Error("Network error");
                forecastData = await res.json();
                localStorage.setItem('cache_forecast_weather', JSON.stringify(forecastData));
            } catch (e) {
                isOffline = true;
                forecastData = JSON.parse(localStorage.getItem('cache_forecast_weather'));
            }

            if (!currentData) {
                currentData = { temperature: { data: [{ place: "天文台", value: 25 }] }, humidity: { data: [{ value: 75 }] } };
            }
            if (!forecastData || !forecastData.weatherForecast) {
                forecastData = { weatherForecast: [] };
            }

            let matchedTemp = null;
            if (currentData.temperature && currentData.temperature.data) {
                const stationsList = currentData.temperature.data;
                const found = stationsList.find(item => item.place.includes(targetStation));
                if (found) {
                    matchedTemp = found.value;
                } else {
                    const fallbackStation = stationsList.find(item => item.place === "天文台") || stationsList[0];
                    matchedTemp = fallbackStation ? fallbackStation.value : 25;
                }
            } else {
                matchedTemp = 25;
            }

            let hkHumidity = currentData.humidity?.data?.[0]?.value ?? 75;
            let hkUvIndex = currentData.uvIndex?.data?.[0]?.value ?? 0;
            
            let warningTexts = [];
            if (currentData.warningMessage) {
                currentData.warningMessage.forEach(msg => warningTexts.push(msg));
            }

            let textForecastList = [];
            let futureRainOrThunderAlert = false;
            const threeDayForecast = forecastData.weatherForecast.slice(0, 3);

            if (threeDayForecast.length > 0) {
                threeDayForecast.forEach(day => {
                    let weekName = day.week ?? "明天";
                    let maxT = day.forecastMaxTemp?.value ?? 28;
                    let minT = day.forecastMinTemp?.value ?? 22;
                    let psrText = day.PSR ?? "低"; 
                    let uvValue = day.forecastMaxUV?.value ?? 0;

                    textForecastList.push({
                        week: weekName, tempRange: `${minT}-${maxT}°C`, psr: psrText, uv: uvValue
                    });

                    const weatherText = day.forecastWeather ?? "";
                    if (weatherText.includes('雨') || weatherText.includes('雷')) {
                        futureRainOrThunderAlert = true;
                    }
                });
            } else {
                textForecastList = [
                    { week: "明天", tempRange: "22-28°C", psr: "低", uv: 2 },
                    { week: "後天", tempRange: "23-29°C", psr: "低", uv: 3 },
                    { week: "大後天", tempRange: "22-28°C", psr: "中", uv: 1 }
                ];
            }

            return {
                temp: matchedTemp, humidity: hkHumidity, uv: hkUvIndex,
                warningRaw: warningTexts.join('、'), isOffline: isOffline,
                textForecastList: textForecastList,
                futureRainOrThunderAlert: futureRainOrThunderAlert
            };
        }

        // 2. 內嵌式 AI 執行邏輯（整合 GPS 智能大眾運輸時間模擬公式）
        async function triggerCardAI(route, currentCardElement) {
            document.querySelectorAll('.card-ai-box').forEach(box => {
                if (box !== currentCardElement.querySelector('.card-ai-box')) {
                    box.style.display = 'none';
                    box.innerHTML = '';
                }
            });

            const aiBox = currentCardElement.querySelector('.card-ai-box');
            aiBox.style.display = 'block';
            aiBox.innerHTML = `<div style="color: var(--secondary-text); font-style: italic;">AI 正在連動分區氣象台、系統時鐘與精算 GPS 公共交通... 🕒</div>`;
            aiBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            const weather = await fetchHKWeatherAndForecast(route.station);

            // 1. 改良交通與總行程時間計算公式邏輯
            let transitRoundTripHours = 2.4; // 預設全港平均大眾運輸來回為 2.4 小時
            let algorithmNote = "(未開啟 GPS 定位，已採用全港公共交通來回平均時間 2.4 小時進行估算)";

            if (userLocation) {
                const startParts = route.startCoords.split(',');
                const distanceKM = calculateHaversineDistance(userLocation.lat, userLocation.lng, parseFloat(startParts[0]), parseFloat(startParts[1]));
                
                // 單程大眾運輸時間（分鐘）= (distance * 3) + 20
                const singleWayMinutes = (distanceKM * 3) + 20;
                // 來回交通總時數（小時）= (單程時間 * 2) / 60
                transitRoundTripHours = (singleWayMinutes * 2) / 60;
                
                // 格式化輸出
                transitRoundTripHours = parseFloat(transitRoundTripHours.toFixed(1));
                algorithmNote = `(已根據您與起點的實時 GPS 距離：${distanceKM.toFixed(2)} km 估算來回大眾運輸時間)`;
            }

            const userLevel = document.getElementById('user-level-select').value;
            const dynamicETA = computeRouteETA(route.baseDuration, userLevel, weather.temp, weather.humidity);
            
            // 全行程預估時間 = 來回交通總時數 + 實際行山時數
            const totalJourneyTime = parseFloat((transitRoundTripHours + dynamicETA).toFixed(1));

            // 日落時間判定與倒數
            const now = new Date();
            const currentTotalMinutes = now.getHours() * 60 + now.getMinutes();
            const sunsetTotalMinutes = 19 * 60 + 10; 
            const diffMinutes = sunsetTotalMinutes - currentTotalMinutes;

            let sunsetText = "";
            if (diffMinutes > 0) {
                const textHour = Math.floor(diffMinutes / 60);
                const textMin = diffMinutes % 60;
                sunsetText = `🌇 今日預估日落時間：19:10 (距離天黑還有 ${textHour} 小時 ${textMin} 分鐘)`;
            } else {
                sunsetText = `🌇 今日日落時間：19:10 (注意：目前天色已黑，切勿此時入山！ )`;
            }

            const currentHourDecimal = now.getHours() + (now.getMinutes() / 60);
            const estimatedFinishedHour = currentHourDecimal + dynamicETA;
            const sunsetHourDecimal = 19 + (10 / 60);

            let nightWarningHTML = "";
            if (estimatedFinishedHour >= sunsetHourDecimal) {
                nightWarningHTML = `
                    <div class="warning-alert-orange">
                        ⚠️【天黑落山警告】<br>
                        系統偵測到當前時間為 ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}，加上您個人化預估完成時數 (${dynamicETA}小時)，預計完成行山時天色已黑！請立刻評估是否提早出發、縮短行程或攜帶頭燈！
                    </div>`;
            }

            let forecastHTML = '';
            weather.textForecastList.forEach(item => {
                forecastHTML += `
                    <div class="forecast-card">
                        <div class="forecast-card-title">${item.week}</div>
                        <div>${item.tempRange}</div>
                        <div>🌧️ 降雨: ${item.psr}</div>
                        <div>☀️ UV: ${item.uv}</div>
                    </div>`;
            });

            let aiReport = `【AI 行山教練分區決策報告 —— ${route.name}】\n\n`;
            aiReport += `📡 實時分區觀測（${route.station}站）：🌡️ 氣溫 ${weather.temp}°C | 💧 濕度 ${weather.humidity}% | ☀️ 紫外線 ${weather.uv}\n`;
            aiReport += weather.warningRaw ? `⚠️ 天文台警報：${weather.warningRaw}\n\n` : `🟢 目前該分區無惡劣天氣警告\n\n`;
            
            const routeDiff = parseInt(route.difficulty);
            if (userLevel === 'beginner' && routeDiff === 5) {
                aiReport += `🚨【越級挑戰警告】\n偵測到您目前為新手體能，而${route.name}難度極高！請特別注意，在此環境下預估完成時間已拉長，每行 20 分鐘請強制休息！\n\n`;
            } else if (userLevel === 'expert' && routeDiff === 1) {
                aiReport += `😎【輕鬆漫步】\n此路線難度較低，您可以輕鬆駕馭。\n\n`;
            } else {
                let matchedText = "";
                if (userLevel === 'beginner') matchedText = "🐣 新手適配中低難度路線，請保持安全均速。";
                else if (userLevel === 'intermediate') matchedText = "🏃 您的能力與此路線完美適配！可維持標準穩定配速。";
                else if (userLevel === 'expert') matchedText = "🧗 您是專業老手，能輕鬆應對。";
                aiReport += `⚖️【體能配速評估】\n${matchedText}\n\n`;
            }

            if (weather.temp >= 30 || weather.humidity >= 85) {
                aiReport += `🔥【環境悶熱警報】\n當前分區氣候酷熱/悶熱，體能消耗加快，AI 時間已包含 15% 補水緩衝。\n\n`;
            }

            aiReport += `💧 補給建議：準備約 ${weather.temp > 28 ? '2.5' : '1.5'} 公升飲用水。\n`;
            aiReport += `🎒 裝備建議：沿途特色為 ${route.views}。請穿著高防滑係數行山鞋。`;
            if (weather.uv >= 6) aiReport += ` 務必做好防曬，配戴太陽眼鏡。`;
            if (weather.futureRainOrThunderAlert) aiReport += `\n\n⚠️ 天氣提示：未來 3 天預報顯示局部地區有雨，請帶備雨具。`;

            // 更新 HTML
            aiBox.innerHTML = `
                <div id="offline-banner" class="offline-alert" style="display: ${weather.isOffline ? 'block' : 'none'};">📴 當前處於離線狀態，正顯示緩存天氣</div>
                
                <h4 style="margin-top: 0; color: #2e7d32; margin-bottom: 10px;">🤖 本地卡片 AI 智能建議：</h4>
                
                <div style="margin-bottom: 10px; font-size: 14px; line-height: 1.6;">
                    <div style="font-weight: bold; color: #2e7d32;">⏱️ AI 預估純行山時間：${dynamicETA} 小時</div>
                    <div style="font-weight: bold; color: #1a73e8;">🚌 今日總行程預估出門時間（大眾運輸）：約 ${totalJourneyTime} 小時</div>
                    <div style="font-size: 12px; color: var(--secondary-text); font-weight: 500;">${algorithmNote}</div>
                </div>

                <div class="weather-banner">
                    <div>${sunsetText}</div>
                </div>

                <div style="margin-bottom: 5px; font-weight: bold; font-size: 13px;">📅 未來 3 日預報</div>
                <div class="forecast-container">${forecastHTML}</div>

                <p style="white-space: pre-line; line-height: 1.6; font-size: 14px; margin-bottom: 0;">${aiReport}</p>
                ${nightWarningHTML}
            `;
        }

        // 黑夜模式切換
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeToggleBtn.innerText = savedTheme === 'dark' ? '☀️ 白天模式' : '🌙 黑夜模式';
        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            themeToggleBtn.innerText = newTheme === 'dark' ? '☀️ 白天模式' : '🌙 黑夜模式';
            localStorage.setItem('theme', newTheme);
        });

        // 初始化
        initTagsUI();
        favoriteCountSpan.innerText = `已收藏 ${savedFavorites.length} 條路線`;
        searchBtn.click();
    </script>
</body>
