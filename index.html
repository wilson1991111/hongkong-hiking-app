<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港 AI 行山路線搜尋 - 專業戶外安全航海版</title>
    <style>
        :root {
            --bg-color: #f7f9f7;
            --text-color: #333333;
            --card-bg: #ffffff;
            --card-border: #eef2ee;
            --box-shadow: rgba(0,0,0,0.05);
            --label-color: #444444;
            --secondary-text: #666666;
            --badge-bg: #f0f4f0;
            --input-bg: #fafafa;
            --input-border: #e0e0e0;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --card-bg: #1e1e1e;
            --card-border: #2c2c2c;
            --box-shadow: rgba(0,0,0,0.3);
            --label-color: #bbbbbb;
            --secondary-text: #aaaaaa;
            --badge-bg: #2d372d;
            --input-bg: #252525;
            --input-border: #444444;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: 15px; 
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .theme-toggle-btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--input-border);
            padding: 8px 12px;
            font-size: 13px;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 2px 4px var(--box-shadow);
            font-weight: 600;
        }

        .favorite-badge {
            font-size: 13px;
            color: #2e7d32;
            background-color: #e8f5e9;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
        }
        [data-theme="dark"] .favorite-badge {
            color: #81c784;
            background-color: #1b3820;
        }

        h1 {
            font-size: 24px;
            color: #2e7d32;
            text-align: center;
            margin-top: 10px;
            margin-bottom: 5px;
        }
        [data-theme="dark"] h1 { color: #81c784; }
        
        #subtitle {
            font-size: 14px;
            color: var(--secondary-text);
            text-align: center;
            margin-bottom: 25px;
        }

        .search-box { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: 0 4px 12px var(--box-shadow); 
            margin-bottom: 20px;
            border: 1px solid var(--card-border);
        }

        .filter-group { margin-bottom: 15px; }

        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            font-size: 15px;
            color: var(--label-color);
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border-radius: 10px;
            border: 1px solid var(--input-border);
            background-color: var(--input-bg);
            color: var(--text-color);
            box-sizing: border-box;
        }

        .tags-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 5px;
        }
        .filter-tag-btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--input-border);
            padding: 6px 14px;
            font-size: 13px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .filter-tag-btn.active {
            background-color: #2e7d32;
            color: white;
            border-color: #2e7d32;
        }
        [data-theme="dark"] .filter-tag-btn.active {
            background-color: #81c784;
            color: #121212;
            border-color: #81c784;
        }

        select, .main-search-btn, .gps-btn { 
            width: 100%; 
            padding: 14px; 
            font-size: 16px; 
            border-radius: 10px; 
            border: 1px solid var(--input-border); 
            background-color: var(--input-bg);
            color: var(--text-color);
            box-sizing: border-box;
        }

        .main-search-btn { 
            background-color: #2e7d32; 
            color: white; 
            border: none; 
            font-weight: bold;
            cursor: pointer; 
            margin-top: 15px;
            box-shadow: 0 4px 6px rgba(46, 125, 50, 0.2);
        }

        .gps-btn {
            background-color: #0288d1;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(2, 136, 209, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .route-card {
            position: relative; 
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px var(--box-shadow);
            border: 1px solid var(--card-border);
        }
        .route-title {
            font-size: 18px;
            font-weight: bold;
            color: #2e7d32;
            margin: 0 0 8px 0;
            padding-right: 35px; 
        }
        [data-theme="dark"] .route-title { color: #81c784; }

        .love-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
        }

        .route-details {
            font-size: 14px;
            color: var(--secondary-text);
            margin-bottom: 12px;
        }
        .route-details span {
            display: inline-block;
            background: var(--badge-bg);
            color: var(--text-color);
            padding: 4px 8px;
            border-radius: 4px;
            margin-right: 5px;
            margin-bottom: 5px;
            font-size: 12px;
        }

        .gps-distance-tag {
            background-color: #e1f5fe !important;
            color: #0288d1 !important;
            font-weight: 600;
        }

        /* 建議2：剖面圖與地形分佈 CSS */
        .elevation-wrapper {
            margin: 12px 0;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            padding: 10px;
            border-radius: 8px;
        }
        .elevation-title {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }
        .elevation-bar {
            display: flex;
            height: 14px;
            border-radius: 7px;
            overflow: hidden;
            background: #e0e0e0;
        }
        .elev-part {
            height: 100%;
            transition: width 0.3s;
        }
        .elev-flat { background-color: #4caf50; }  /* 平緩泥路 */
        .elev-stairs { background-color: #ff9800; }/* 梯級路段 */
        .elev-steep { background-color: #f44336; } /* 陡峭碎石 */
        
        .elevation-legend {
            display: flex;
            gap: 10px;
            font-size: 11px;
            margin-top: 5px;
            color: var(--secondary-text);
        }
        .legend-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 3px;
        }

        .card-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            width: 100%;
            margin-top: 10px;
        }

        .ask-ai-btn, .nav-btn, .map-btn, .gpx-btn {
            display: inline-block;
            flex: 1 1 calc(50% - 4px); 
            padding: 12px 8px;
            font-size: 13px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            box-sizing: border-box;
            border: none;
            cursor: pointer;
        }

        .ask-ai-btn {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }
        [data-theme="dark"] .ask-ai-btn {
            background-color: #1b3820;
            color: #81c784;
            border: 1px solid #2d5a32;
        }

        .nav-btn { background-color: #1a73e8; color: white; }
        
        .gpx-btn { 
            background-color: #7b1fa2; 
            color: white; 
        } /* GPX 匯出紫色按鈕 */

        .map-btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--input-border);
        }

        .danger-alert {
            color: #d9381e !important;
            font-weight: bold;
            background-color: #fff0f0;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #ffcccc;
            display: inline-block;
            margin-top: 5px;
        }
        
        .warning-alert-orange {
            color: #e65100 !important;
            font-weight: bold;
            background-color: #fff3e0;
            padding: 10px 14px;
            border-radius: 6px;
            border: 1px solid #ffe0b2;
            display: block;
            margin-top: 10px;
            line-height: 1.5;
        }
        [data-theme="dark"] .warning-alert-orange {
            background-color: #3e2723;
            color: #ffb74d !important;
            border: 1px solid #5d4037;
        }

        .offline-alert {
            background-color: #ff9800 !important;
            color: white !important;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 6px;
            display: block;
            margin-bottom: 10px;
            text-align: center;
        }

        .forecast-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .forecast-card {
            flex: 1;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
        }
        .forecast-card-title {
            font-weight: bold;
            color: #2e7d32;
            margin-bottom: 4px;
        }
        [data-theme="dark"] .forecast-card-title { color: #81c784; }

        .eta-badge {
            background-color: #fff3e0;
            color: #e65100;
            border: 1px solid #ffe0b2;
            font-weight: bold;
        }
        [data-theme="dark"] .eta-badge {
            background-color: #3e2723;
            color: #ffb74d;
            border: 1px solid #5d4037;
        }

        .card-ai-box {
            margin-top: 15px;
            padding: 15px;
            background-color: var(--card-bg);
            border-left: 5px solid #2e7d32;
            border-radius: 4px 12px 12px 4px;
            border: 1px solid var(--card-border);
            transition: all 0.3s ease;
        }
        
        .weather-banner {
            background: #f1f8ff;
            border: 1px solid #c8e1ff;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 13px;
            color: #0366d6;
        }
        [data-theme="dark"] .weather-banner {
            background: #141d26;
            border: 1px solid #243342;
            color: #388bfd;
        }

        /* 建議1&3：緊急撤退與攝影盒子 */
        .ai-safety-box {
            background-color: #fff0f0;
            border: 1px solid #ffcccc;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            font-size: 13px;
        }
        [data-theme="dark"] .ai-safety-box {
            background-color: #2c1a1a;
            border: 1px solid #5c2c2c;
        }

        .photo-box {
            background-color: #fff8e1;
            border: 1px solid #ffe082;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            font-size: 13px;
        }
        [data-theme="dark"] .photo-box {
            background-color: #2d2615;
            border: 1px solid #5d4f2a;
        }

        .ai-suggestion-content {
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }
        .ai-suggestion-content p {
            margin: 6px 0;
            font-size: 14px;
        }
        .ai-gear-list {
            list-style: none;
            padding-left: 0;
            margin: 10px 0 0 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 8px;
        }
        .ai-gear-list li {
            font-size: 13px;
            padding: 6px 10px;
            background-color: var(--card-bg);
            border: 1px solid var(--input-border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button id="theme-toggle" class="theme-toggle-btn">🌙 切換黑夜模式</button>
        <div id="favorite-count" class="favorite-badge">已收藏 0 條路線</div>
    </div>

    <h1>⛰️ HikingRice 香港行山搜尋</h1>
    <p id="subtitle">尋找你的下一條行山路線 x 專業安全撤退精算教練</p>

    <div class="search-box">
        <button id="gps-btn" class="gps-btn">📍 獲取我的位置計算距離與精確車程</button>

        <div class="filter-group">
            <label for="keyword-input">關鍵字搜尋：</label>
            <input type="text" id="keyword-input" placeholder="搜尋景觀、起點或關鍵字（如：芒草）...">
        </div>

        <div class="filter-group">
            <label>熱門路線標籤 (可多選)：</label>
            <div id="tags-cloud" class="tags-cloud"></div>
        </div>

        <div class="filter-group">
            <label for="region-select">選擇地區：</label>
            <select id="region-select">
                <option value="all">-- 所有地區 --</option>
                <option value="sai-kung">西貢 (例如：麥理浩徑)</option>
                <option value="hk-island">港島 (例如：龍脊)</option>
                <option value="lantau">大嶼山 (例如：大東山)</option>
            </select>
        </div>

        <div style="display: flex; gap: 10px; width: 100%; box-sizing: border-box;" class="filter-group">
            <div style="flex: 1;">
                <label for="user-level-select">🧘 我的行山能力：</label>
                <select id="user-level-select">
                    <option value="beginner">🐣 行山新手 (年資短/體力一般)</option>
                    <option value="intermediate" selected>🏃 經驗豐富 (有規律運動/行過中級山)</option>
                    <option value="expert">🧗 資深老手 (極佳體能/精通陡峭地形)</option>
                </select>
            </div>
            <div style="flex: 1;">
                <label for="user-weight-input">⚖️ 我的體重 (kg)：</label>
                <input type="number" id="user-weight-input" value="70" min="30" max="150">
            </div>
        </div>

        <div style="display: flex; gap: 10px; width: 100%; box-sizing: border-box;" class="filter-group">
            <div style="flex: 1;">
                <label for="diff-select">難度級別：</label>
                <select id="diff-select">
                    <option value="all">-- 所有難度 --</option>
                    <option value="1">★☆☆☆☆ 新手入門</option>
                    <option value="3">★★★☆☆ 中等難度</option>
                    <option value="5">★★★★★ 挑戰極限</option>
                </select>
            </div>
            <div style="flex: 1;">
                <label for="duration-select">⏱️ 您的個人化實際耗時篩選：</label>
                <select id="duration-select">
                    <option value="all">不限時數</option>
                    <option value="2">2 小時內搞定</option>
                    <option value="4">4 小時內搞定</option>
                    <option value="6">6 小時內搞定</option>
                </select>
            </div>
        </div>

        <div class="filter-group">
            <label for="sort-select">結果排序：</label>
            <select id="sort-select">
                <option value="default">預設排序</option>
                <option value="distance-asc">距離：由短到長</option>
                <option value="diff-asc">難度：由低到高</option>
            </select>
        </div>

        <button id="search-btn" class="main-search-btn">搜尋個人化路線</button>
    </div>

    <div id="results-list" style="margin-top: 25px;"></div>

    <script>
        // 核心改善：注入撤退點數據、高度剖面數據比例
        const hikingRoutes = [
            { 
                name: "麥理浩徑第一、二段", 
                region: "sai-kung", 
                difficulty: "3", 
                start: "北潭涌", 
                end: "北潭凹", 
                distance: "24km", 
                distanceNum: 24,
                gain: 850,          
                terrainFactor: 1.1, 
                baseDuration: 7.0,
                station: "西貢",
                views: "海景/萬宜水庫",
                tags: ['海景', '萬宜水庫', '長途挑戰'],
                startCoords: "22.3957,114.3233",
                endCoords: "22.4289,114.3314",
                // 建議1：撤退點數據
                escapePoint: { name: "西灣村", method: "乘搭街渡村船至西貢市中心 / 呼叫新界綠色專線小巴", cutoffPercent: 0.5 },
                // 建議2：剖面圖地形比例（平路, 階梯, 陡峭）
                elevationProfile: { flat: 40, stairs: 45, steep: 15 }
            },
            { 
                name: "西灣亭至北潭凹", 
                region: "sai-kung", 
                difficulty: "3", 
                start: "西灣亭", 
                end: "北潭凹", 
                distance: "12km", 
                distanceNum: 12,
                gain: 450,          
                terrainFactor: 1.15,
                baseDuration: 4.0,
                station: "西貢",
                views: "海景/大浪西灣",
                tags: ['海景', '大浪西灣', '新手推薦'],
                startCoords: "22.3994,114.3582",
                endCoords: "22.4289,114.3314",
                escapePoint: { name: "大浪西灣", method: "於西灣亭乘村巴回西貢", cutoffPercent: 0.4 },
                elevationProfile: { flat: 35, stairs: 50, steep: 15 }
            },
            { 
                name: "龍脊", 
                region: "hk-island", 
                difficulty: "1", 
                start: "土地灣", 
                end: "大浪灣", 
                distance: "8.5km", 
                distanceNum: 8.5,
                gain: 320,          
                terrainFactor: 1.0, 
                baseDuration: 3.0,
                station: "赤柱",
                views: "海景/石澳",
                tags: ['海景', '石澳', '新手推薦', '落日'],
                startCoords: "22.2312,114.2384",
                endCoords: "22.2435,114.2505",
                escapePoint: { name: "爛泥灣", method: "沿引水道返回石澳道乘 9 號巴士", cutoffPercent: 0.6 },
                elevationProfile: { flat: 70, stairs: 25, steep: 5 }
            },
            { 
                name: "大東山", 
                region: "lantau", 
                difficulty: "5", 
                start: "伯公坳", 
                end: "梅窩", 
                distance: "9km", 
                distanceNum: 9,
                gain: 750,          
                terrainFactor: 1.3, 
                baseDuration: 4.5,
                station: "昂坪",
                views: "山景/芒草",
                tags: ['山景', '芒草', '高難度'],
                startCoords: "22.2562,113.9298",
                endCoords: "22.2576,113.9622",
                escapePoint: { name: "雙東坳", method: "原路折返伯公坳乘巴士，切勿強行盲目切入南山", cutoffPercent: 0.45 },
                elevationProfile: { flat: 15, stairs: 55, steep: 30 }
            },
            { 
                name: "鳳凰山", 
                region: "lantau", 
                difficulty: "5", 
                start: "伯公坳", 
                end: "昂坪", 
                distance: "7km", 
                distanceNum: 7,
                gain: 850,          
                terrainFactor: 1.4, 
                baseDuration: 4.5,
                station: "昂坪",
                views: "山景/日出",
                tags: ['山景', '日出', '高難度'],
                startCoords: "22.2562,113.9298",
                endCoords: "22.2559,113.9048",
                escapePoint: { name: "斬柴坳", method: "快速沿天梯急降至昂坪市集尋求救援", cutoffPercent: 0.7 },
                elevationProfile: { flat: 10, stairs: 50, steep: 40 }
            }
        ];

        let userLocation = null; 
        let selectedTags = [];
        let savedFavorites = JSON.parse(localStorage.getItem('hikingFavorites')) || [];

        const searchBtn = document.getElementById('search-btn');
        const gpsBtn = document.getElementById('gps-btn');
        const keywordInput = document.getElementById('keyword-input');
        const tagsCloudDiv = document.getElementById('tags-cloud');
        const resultsList = document.getElementById('results-list');
        const favoriteCountSpan = document.getElementById('favorite-count');
        const themeToggleBtn = document.getElementById('theme-toggle');

        function initTagsUI() {
            const allTags = new Set();
            hikingRoutes.forEach(r => r.tags.forEach(t => allTags.add(t)));
            tagsCloudDiv.innerHTML = '';
            allTags.forEach(tag => {
                const btn = document.createElement('button');
                btn.className = 'filter-tag-btn';
                btn.innerText = `# ${tag}`;
                btn.addEventListener('click', () => {
                    if (selectedTags.includes(tag)) {
                        selectedTags = selectedTags.filter(t => t !== tag);
                        btn.classList.remove('active');
                    } else {
                        selectedTags.push(tag);
                        btn.classList.add('active');
                    }
                });
                tagsCloudDiv.appendChild(btn);
            });
        }

        function calculateHaversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a))); 
        }

        function computeRouteETA(route, userLevel, currentTemp, currentHumidity) {
            const distance = route.distanceNum; 
            const gain = route.gain || 0;       
            const terrain = route.terrainFactor || 1.0; 
            
            const weightInput = document.getElementById('user-weight-input');
            const userWeight = weightInput ? parseFloat(weightInput.value) || 70 : 70;

            let baseMinutes = distance * 13.3;
            const ascentPenaltyPer100m = userWeight > 80 ? 12.5 : 10;
            let climbingMinutes = (gain / 100) * ascentPenaltyPer100m;
            let totalEstimatedMinutes = (baseMinutes + climbingMinutes) * terrain;

            let levelFactor = 1.0;
            if (userLevel === 'beginner') levelFactor = 1.35;
            else if (userLevel === 'expert') levelFactor = 0.75;
            totalEstimatedMinutes *= levelFactor;

            if (currentTemp >= 32) totalEstimatedMinutes += (distance * 4);
            else if (currentTemp >= 29) totalEstimatedMinutes += (distance * 2);
            
            if (currentHumidity >= 85 && currentTemp >= 27) totalEstimatedMinutes *= 1.05;

            let finalHours = totalEstimatedMinutes / 60;
            return parseFloat(Math.max(finalHours, 0.5).toFixed(1));
        }

        function calculateWaterNeed(duration, temp, difficulty) {
            const weightInput = document.getElementById('user-weight-input');
            const userWeight = weightInput ? parseFloat(weightInput.value) || 70 : 70; 
            let water = userWeight * 0.006 * parseFloat(duration);
            if (parseFloat(temp) >= 30) water += 0.6;
            if (parseInt(difficulty) >= 4) water += 0.4; 
            return parseFloat(Math.max(water, 0.5).toFixed(1));
        }

        function generateGearList(difficulty, temp, humidity, uv, duration, views) {
            let gear = ["基本急救包", "手機及隨身充"];
            if (uv >= 6) gear.push("防曬霜", "太陽眼鏡", "遮陽帽");
            if (humidity >= 85) gear.push("替換排汗衣", "毛巾");
            if (parseInt(difficulty) >= 4) gear.push("登山杖", "離線地圖");
            if (duration >= 5) gear.push("行動糧/能量棒");
            return gear;
        }

        async function fetchHKWeatherAndForecast(targetStation) {
            let isOffline = false;
            let currentData = null;
            let forecastData = null;

            try {
                const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
                currentData = await res.json();
                localStorage.setItem('cache_current_weather', JSON.stringify(currentData));
            } catch (e) {
                isOffline = true;
                currentData = JSON.parse(localStorage.getItem('cache_current_weather'));
            }

            try {
                const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=tc');
                forecastData = await res.json();
                localStorage.setItem('cache_forecast_weather', JSON.stringify(forecastData));
            } catch (e) {
                isOffline = true;
                forecastData = JSON.parse(localStorage.getItem('cache_forecast_weather'));
            }

            if (!currentData) currentData = { temperature: { data: [{ place: "天文台", value: 25 }] }, humidity: { data: [{ value: 75 }] } };
            if (!forecastData || !forecastData.weatherForecast) forecastData = { weatherForecast: [] };

            let matchedTemp = 25;
            if (currentData.temperature?.data) {
                const found = currentData.temperature.data.find(item => item.place.includes(targetStation));
                matchedTemp = found ? found.value : (currentData.temperature.data.find(item => item.place === "天文台")?.value ?? 25);
            }

            let hkHumidity = currentData.humidity?.data?.[0]?.value ?? 75;
            let hkUvIndex = currentData.uvIndex?.data?.[0]?.value ?? 0;
            let warningTexts = currentData.warningMessage ? currentData.warningMessage.map(msg => msg) : [];

            let textForecastList = [];
            let futureRainOrThunderAlert = false;
            const threeDayForecast = forecastData.weatherForecast.slice(0, 3);

            if (threeDayForecast.length > 0) {
                threeDayForecast.forEach(day => {
                    textForecastList.push({
                        week: day.week ?? "明天", tempRange: `${day.forecastMinTemp?.value ?? 22}-${day.forecastMaxTemp?.value ?? 28}°C`, psr: day.PSR ?? "低", uv: day.forecastMaxUV?.value ?? 0
                    });
                    if ((day.forecastWeather ?? "").includes('雨') || (day.forecastWeather ?? "").includes('雷')) futureRainOrThunderAlert = true;
                });
            } else {
                textForecastList = [{ week: "明天", tempRange: "22-28°C", psr: "低", uv: 2 }, { week: "後天", tempRange: "23-29°C", psr: "低", uv: 3 }];
            }

            return { temp: matchedTemp, humidity: hkHumidity, uv: hkUvIndex, warningRaw: warningTexts.join('、'), isOffline: isOffline, textForecastList: textForecastList, futureRainOrThunderAlert: futureRainOrThunderAlert };
        }
